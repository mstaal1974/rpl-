# Cloud Build config for the RPL portal.
#
# Why this file exists:
#   The GitHub repo is named "rpl-" (trailing hyphen). The auto-generated
#   "deploy to Cloud Run" trigger builds an image named
#     <host>/<project>/cloud-run-source-deploy/$REPO_NAME/<service>:<sha>
#   i.e. ".../rpl-/rpl-portal:<sha>" — and a Docker reference path component
#   cannot end in a hyphen, so `docker build -t` fails with
#   "invalid reference format". This config uses a fixed, valid image name and
#   the correct build context (the app lives in rpl_v5/, not the repo root).
#
# Point your trigger at this file:
#   Console → Cloud Build → Triggers → (your trigger) → Edit →
#     Configuration = "Cloud Build configuration file (yaml or json)"
#     Location = /cloudbuild.yaml
#   or:
#   gcloud builds triggers update github TRIGGER_NAME \
#     --build-config=cloudbuild.yaml --region=REGION

substitutions:
  _SERVICE: rpl-portal
  _REGION: australia-southeast1
  _AR_REPO: cloud-run-source-deploy
  _AR_HOST: australia-southeast1-docker.pkg.dev

images:
  - '${_AR_HOST}/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA'
  - '${_AR_HOST}/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 1) Build from the app directory (rpl_v5/), with a VALID image name.
  - id: Build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - '-t'
      - '${_AR_HOST}/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA'
      - '-t'
      - '${_AR_HOST}/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest'
      - rpl_v5

  # 2) Push both tags.
  - id: Push
    name: gcr.io/cloud-builders/docker
    args: ['push', '--all-tags', '${_AR_HOST}/$PROJECT_ID/${_AR_REPO}/${_SERVICE}']

  # 3) Deploy. Using --image (not --source) preserves the service's existing
  #    env vars (AUTH_SECRET, BASE_URL, etc.) and settings.
  #
  #    --update-secrets wires the ANTHROPIC_API_KEY secret from Secret Manager
  #    onto the service as an env var, so get_client() takes the direct-API path
  #    (bypassing the Vertex Claude quota). Creating the secret is NOT enough —
  #    it must be referenced here or the container never sees it.
  #    Prereqs (one-time):
  #      * Secret exists: gcloud secrets create ANTHROPIC_API_KEY (done)
  #      * The Cloud Run runtime service account can read it:
  #          gcloud secrets add-iam-policy-binding ANTHROPIC_API_KEY \
  #            --member="serviceAccount:<RUNTIME_SA>" \
  #            --role="roles/secretmanager.secretAccessor"
  #        (<RUNTIME_SA> defaults to <PROJECT_NUMBER>-compute@developer.gserviceaccount.com)
  #
  #    --cpu-always-allocated + --min-instances=1 keep CPU on after the HTTP
  #    response returns, so the background auto-analysis task actually completes
  #    instead of being throttled when the instance would otherwise scale down.
  - id: Deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE}'
      - '--image=${_AR_HOST}/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--update-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest'
      - '--no-cpu-throttling'
      - '--min-instances=1'
      - '--quiet'
